name: Weekly Model Retraining

# HOW THIS WORKS:
#
# Scheduled (every Sunday): INCREMENTAL update only.
#   - Downloads the last 30 days of new price data (~50 MB, not 57 GB)
#   - Appends new windows to a temporary in-memory dataset
#   - Fine-tunes each model on recent data (fast, fits in 7 GB RAM)
#   - Commits updated .pth / .pkl weights back to the repo
#
# Manual dispatch: Choose which model to retrain.
#   - Still uses incremental data update by default
#   - For a full 10-year rebuild, run locally:
#       python retrain.py --refresh-data
#
# Why NOT full rebuild on GitHub Actions:
#   - Free runners: 2 CPU / 7 GB RAM / ~14 GB disk
#   - Full 10-year dataset = ~57 GB disk, ~16 GB RAM — impossible on free runners
#   - Transformer training: ~54s/epoch × 100 epochs = 90 min on GPU,
#     30-75x slower on 2-core CPU = runner times out before finishing
#   - Incremental update: ~5 min total, safe within the 60-min limit

on:
  schedule:
    # Every Sunday at 2am UTC — after US market close Friday
    - cron: "0 2 * * 0"

  workflow_dispatch:
    inputs:
      model:
        description: "Which model to retrain (all / transformer / lstm / rnn / rf)"
        required: false
        default: "all"

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # incremental update + fine-tuning fits in 90 min

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run incremental retraining
        # CI=true is set automatically by GitHub Actions — retrain.py detects
        # this and uses --incremental mode automatically (no flag needed).
        env:
          MODEL: ${{ github.event.inputs.model || 'all' }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: python retrain.py --model $MODEL

      # Only commit the small model weight files — never the dataset (.npz)
      - name: Commit updated model weights
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            transformer_final/transformer_multi_horizon.pth \
            transformer_final/scaler_feat.pkl \
            transformer_final/scaler_ret.pkl \
            transformer_final/transformer_meta.pkl \
            lstm_final_project/lstm_multi_horizon.pth \
            lstm_final_project/lstm_scaler_feat.pkl \
            lstm_final_project/lstm_scaler_targ.pkl \
            lstm_final_project/lstm_meta.pkl \
            rnn_final/rnn_multi_horizon.pth \
            rnn_final/rnn_scaler_feat.pkl \
            rnn_final/rnn_scaler_targ.pkl \
            rnn_final/rnn_meta.pkl \
            rf_final/rf_multi_horizon.pkl \
            rf_final/feature_list_multi.pkl
          git diff --cached --quiet || git commit -m "chore: weekly model retrain $(date -u +'%Y-%m-%d')"
          git push
