name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # light training deps the tests need: LightGBM (+ scikit-learn, which its
          # LGBMRegressor wrapper requires), SciPy metrics, arch GARCH baseline.
          # AutoGluon/Chronos is intentionally excluded — its one test is skipped
          # via importorskip — so CI stays fast.
          pip install lightgbm scikit-learn scipy arch

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest)
        run: pytest -q
